name: Deploy App to EC2

on:
  push:
    branches:
      - main  # Changed to "branches" so it actually runs when you push to main

env:
  TARGET_DIR: home  # Changed to match the variable used below
  EC2_USER: ubuntu

jobs:
  deploy:
    environment: prod
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the files
        uses: actions/checkout@v4

      - name: Deploy to EC2 Server
        uses: easingthemes/ssh-deploy@main
        with:
          # These MUST be lowercase for this specific action
          ssh_private_key: ${{ secrets.EC2_SSH_KEY }}
          remote_host: ${{ vars.HOST_DNS }}
          remote_user: ${{ env.EC2_USER }}
          target: ${{ env.TARGET_DIR }}

      - name: Executing remote ssh commands using ssh key
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.HOST_DNS }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo apt-get -y update
            sudo apt-get install -y apache2
            sudo systemctl start apache2
            sudo systemctl enable apache2
            
            # Navigate to the folder where files were uploaded
            cd ~/${{ env.TARGET_DIR }}
            
            # Clean and move files
            sudo rm -rf /var/www/html/*
            sudo cp -r . /var/www/html/
            
            # Fix permissions so Apache can read the files
            sudo chown -R www-data:www-data /var/www/html